name: Swift

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  build:

    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Xcode
      run: sudo xcode-select --switch /Applications/Xcode_16.0.app  # Optional, depending on your Xcode version
    - name: Clean Derived Data
      run: rm -rf ~/Library/Developer/Xcode/DerivedData/*
    - name: Clean Build Folder
      run: xcodebuild clean -scheme nestymate-ios -project nestymate-ios.xcodeproj   
    - name: Build with Xcode
      run: xcodebuild -scheme nestymate-ios -project nestymate-ios.xcodeproj -destination 'platform=iOS Simulator,name=iPhone 15' build
    - name: Run tests with Xcode
      run: xcodebuild test -scheme nestymate-ios -project nestymate-ios.xcodeproj -destination 'platform=iOS Simulator,name=iPhone 15' test
